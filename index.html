<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Trading Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="user-stats">
            <h2>💰 <span id="coin-balance">1,000</span> Coins</h2>
            <button id="watch-ad-btn">🎬 +500 Coins</button>
        </div>
    </header>

    <section class="news-container">
        <h3>📰 Market News</h3>
        <div id="news-feed">
            <p class="news-item">Welcome to the Market! Read the news before making trades.</p>
        </div>
    </section>

    <main>
        <h3>📈 Stock Marketplace</h3>
        <div id="market-list">
            <div class="company-card">
                <div class="company-info">
                    <span class="company-name">MacroSoft (MSFT)</span>
                    <span class="company-price"><span id="msft-price">150</span> Coins</span>
                </div>
                <div class="trade-actions">
                    <button class="btn buy-btn" onclick="buyStock('MSFT')">Buy</button>
                    <button class="btn sell-btn" onclick="sellStock('MSFT')">Sell</button>
                </div>
            </div>
            
            <div class="company-card">
                <div class="company-info">
                    <span class="company-name">Chipot-In (CHIP)</span>
                    <span class="company-price"><span id="chip-price">50</span> Coins</span>
                </div>
                <div class="trade-actions">
                    <button class="btn buy-btn" onclick="buyStock('CHIP')">Buy</button>
                    <button class="btn sell-btn" onclick="sellStock('CHIP')">Sell</button>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
